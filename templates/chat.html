<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Local LLM Chat</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Oxygen, Ubuntu, sans-serif;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 100%);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .header {
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            padding: 1rem 2rem;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
        }

        .header h1 {
            color: #fff;
            font-size: 1.5rem;
            font-weight: 600;
        }

        .header .status {
            color: #4ade80;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        .chat-container {
            flex: 1;
            max-width: 900px;
            width: 100%;
            margin: 0 auto;
            padding: 2rem;
            display: flex;
            flex-direction: column;
        }

        .messages {
            flex: 1;
            overflow-y: auto;
            padding: 1rem;
            margin-bottom: 1rem;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 12px;
            min-height: 400px;
        }

        .message {
            margin-bottom: 1rem;
            padding: 1rem;
            border-radius: 8px;
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .message.user {
            background: rgba(59, 130, 246, 0.2);
            border-left: 3px solid #3b82f6;
            margin-left: 2rem;
        }

        .message.assistant {
            background: rgba(74, 222, 128, 0.1);
            border-left: 3px solid #4ade80;
            margin-right: 2rem;
        }

        .message.error {
            background: rgba(239, 68, 68, 0.2);
            border-left: 3px solid #ef4444;
        }

        .message-label {
            font-size: 0.75rem;
            color: rgba(255, 255, 255, 0.6);
            margin-bottom: 0.5rem;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }

        .message-content {
            color: #fff;
            line-height: 1.6;
            white-space: pre-wrap;
            word-wrap: break-word;
        }

        .input-area {
            display: flex;
            gap: 1rem;
            padding: 1rem;
            background: rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            border-radius: 12px;
        }

        .input-area textarea {
            flex: 1;
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 8px;
            padding: 1rem;
            color: #fff;
            font-size: 1rem;
            resize: none;
            min-height: 60px;
            font-family: inherit;
        }

        .input-area textarea:focus {
            outline: none;
            border-color: #3b82f6;
        }

        .input-area textarea::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        .send-btn {
            background: #3b82f6;
            color: #fff;
            border: none;
            border-radius: 8px;
            padding: 0 2rem;
            font-size: 1rem;
            font-weight: 600;
            cursor: pointer;
            transition: background 0.2s;
        }

        .send-btn:hover {
            background: #2563eb;
        }

        .send-btn:disabled {
            background: rgba(255, 255, 255, 0.2);
            cursor: not-allowed;
        }

        .settings {
            display: flex;
            gap: 1rem;
            margin-bottom: 1rem;
            flex-wrap: wrap;
        }

        .setting {
            display: flex;
            align-items: center;
            gap: 0.5rem;
        }

        .setting label {
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.875rem;
        }

        .setting input {
            background: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.2);
            border-radius: 4px;
            padding: 0.5rem;
            color: #fff;
            width: 80px;
        }

        .typing-indicator {
            display: inline-flex;
            gap: 4px;
            padding: 0.5rem;
        }

        .typing-indicator span {
            width: 8px;
            height: 8px;
            background: rgba(255, 255, 255, 0.5);
            border-radius: 50%;
            animation: bounce 1.4s infinite ease-in-out;
        }

        .typing-indicator span:nth-child(1) { animation-delay: -0.32s; }
        .typing-indicator span:nth-child(2) { animation-delay: -0.16s; }

        @keyframes bounce {
            0%, 80%, 100% { transform: scale(0); }
            40% { transform: scale(1); }
        }

        .clear-btn {
            background: transparent;
            border: 1px solid rgba(255, 255, 255, 0.3);
            color: rgba(255, 255, 255, 0.8);
            padding: 0.5rem 1rem;
            border-radius: 6px;
            cursor: pointer;
            font-size: 0.875rem;
            transition: all 0.2s;
        }

        .clear-btn:hover {
            background: rgba(255, 255, 255, 0.1);
            border-color: rgba(255, 255, 255, 0.5);
        }
    </style>
</head>
<body>
    <div class="header">
        <h1>🤖 Local LLM Chat</h1>
        <div class="status" id="status">Private • No Authorization Required</div>
    </div>

    <div class="chat-container">
        <div class="settings">
            <div class="setting">
                <label for="maxTokens">Max Tokens:</label>
                <input type="number" id="maxTokens" value="512" min="1" max="4096">
            </div>
            <div class="setting">
                <label for="temperature">Temperature:</label>
                <input type="number" id="temperature" value="0.7" min="0" max="2" step="0.1">
            </div>
            <div class="setting" style="margin-left: auto;">
                <button class="clear-btn" onclick="clearMessages()">Clear Chat</button>
            </div>
        </div>

        <div class="messages" id="messages">
            <div class="message assistant">
                <div class="message-label">Assistant</div>
                <div class="message-content">Hello! I'm your local LLM assistant. How can I help you today?</div>
            </div>
        </div>

        <div class="input-area">
            <textarea 
                id="messageInput" 
                placeholder="Type your message here..." 
                rows="2"
                onkeydown="handleKeyDown(event)"
            ></textarea>
            <button class="send-btn" id="sendBtn" onclick="sendMessage()">Send</button>
        </div>
    </div>

    <script>
        const messagesDiv = document.getElementById('messages');
        const messageInput = document.getElementById('messageInput');
        const sendBtn = document.getElementById('sendBtn');
        const statusDiv = document.getElementById('status');

        let isStreaming = false;

        function handleKeyDown(event) {
            if (event.key === 'Enter' && !event.shiftKey) {
                event.preventDefault();
                sendMessage();
            }
        }

        function addMessage(content, type) {
            const messageDiv = document.createElement('div');
            messageDiv.className = `message ${type}`;
            messageDiv.innerHTML = `
                <div class="message-label">${type === 'user' ? 'You' : type === 'error' ? 'Error' : 'Assistant'}</div>
                <div class="message-content">${escapeHtml(content)}</div>
            `;
            messagesDiv.appendChild(messageDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
            return messageDiv;
        }

        function escapeHtml(text) {
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function showTypingIndicator() {
            const typingDiv = document.createElement('div');
            typingDiv.className = 'message assistant';
            typingDiv.id = 'typingIndicator';
            typingDiv.innerHTML = `
                <div class="message-label">Assistant</div>
                <div class="message-content">
                    <div class="typing-indicator">
                        <span></span><span></span><span></span>
                    </div>
                </div>
            `;
            messagesDiv.appendChild(typingDiv);
            messagesDiv.scrollTop = messagesDiv.scrollHeight;
        }

        function removeTypingIndicator() {
            const indicator = document.getElementById('typingIndicator');
            if (indicator) {
                indicator.remove();
            }
        }

        async function sendMessage() {
            const message = messageInput.value.trim();
            if (!message || isStreaming) return;

            // Add user message
            addMessage(message, 'user');
            messageInput.value = '';
            
            // Disable input
            isStreaming = true;
            sendBtn.disabled = true;
            showTypingIndicator();

            const maxTokens = document.getElementById('maxTokens').value;
            const temperature = document.getElementById('temperature').value;

            try {
                // Use streaming endpoint
                const response = await fetch('/api/chat/stream', {
                    method: 'POST',
                    headers: {
                        'Content-Type': 'application/json',
                    },
                    body: JSON.stringify({
                        message: message,
                        max_tokens: parseInt(maxTokens),
                        temperature: parseFloat(temperature)
                    })
                });

                removeTypingIndicator();

                if (!response.ok) {
                    throw new Error(`HTTP error! status: ${response.status}`);
                }

                // Create assistant message container
                const assistantMsg = addMessage('', 'assistant');
                const contentDiv = assistantMsg.querySelector('.message-content');
                let fullResponse = '';

                // Read SSE stream
                const reader = response.body.getReader();
                const decoder = new TextDecoder();

                while (true) {
                    const { done, value } = await reader.read();
                    if (done) break;

                    const chunk = decoder.decode(value);
                    const lines = chunk.split('\n');

                    for (const line of lines) {
                        if (line.startsWith('data: ')) {
                            const data = JSON.parse(line.slice(6));
                            
                            if (data.token) {
                                fullResponse += data.token;
                                contentDiv.textContent = fullResponse;
                                messagesDiv.scrollTop = messagesDiv.scrollHeight;
                            }
                            
                            if (data.error) {
                                addMessage(data.error, 'error');
                            }
                        }
                    }
                }
            } catch (error) {
                removeTypingIndicator();
                addMessage(`Error: ${error.message}`, 'error');
                statusDiv.textContent = '⚠️ Connection Error';
                statusDiv.style.color = '#ef4444';
            } finally {
                isStreaming = false;
                sendBtn.disabled = false;
                messageInput.focus();
            }
        }

        function clearMessages() {
            messagesDiv.innerHTML = `
                <div class="message assistant">
                    <div class="message-label">Assistant</div>
                    <div class="message-content">Chat cleared. How can I help you?</div>
                </div>
            `;
        }

        // Check health on load
        async function checkHealth() {
            try {
                const response = await fetch('/health');
                const data = await response.json();
                if (data.model_loaded) {
                    statusDiv.textContent = '✓ Model Loaded • Private Access';
                    statusDiv.style.color = '#4ade80';
                } else {
                    statusDiv.textContent = '⚠️ Model Not Loaded';
                    statusDiv.style.color = '#fbbf24';
                }
            } catch (error) {
                statusDiv.textContent = '⚠️ Service Unavailable';
                statusDiv.style.color = '#ef4444';
            }
        }

        checkHealth();
    </script>
</body>
</html>
